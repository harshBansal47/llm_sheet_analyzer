version: "3.9"

services:
  bot:
    build: .
    container_name: sheets_query_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
    environment:
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: ngrok for local webhook testing
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   command: http bot:8000
  #   ports:
  #     - "4040:4040"
  #   depends_on:
  #     - bot